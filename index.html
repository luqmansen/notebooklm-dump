<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Audio Library</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/plyr@3.7.8/dist/plyr.css" crossorigin="anonymous">
<style>
  :root {
    --bg: #121212;
    --card: #1e1e1e;
    --card-2: #262626;
    --accent: #00b4d8;
    --text: #ffffff;
    --muted: #a0a0a0;
    --border: #2e2e2e;
  }
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    margin: 0;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 2rem 1rem;
  }
  .app {
    width: 100%;
    max-width: 560px;
  }
  header {
    margin-bottom: 1.5rem;
  }
  header h1 {
    font-size: 1.4rem;
    margin: 0 0 0.25rem;
    font-weight: 600;
  }
  header p {
    color: var(--muted);
    font-size: 0.9rem;
    margin: 0;
  }
  .tracks {
    background: var(--card);
    border-radius: 12px;
    padding: 0.5rem 0;
    margin-bottom: 1rem;
    list-style: none;
    max-height: 40vh;
    overflow-y: auto;
  }
  .tracks:empty::after {
    content: "No tracks yet. Visit /upload.html to add one.";
    display: block;
    padding: 1.5rem;
    color: var(--muted);
    text-align: center;
    font-size: 0.9rem;
  }
  .track {
    padding: 0.85rem 1rem;
    cursor: pointer;
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
  }
  .track:last-child { border-bottom: none; }
  .track:hover { background: var(--card-2); }
  .track.active { background: var(--card-2); }
  .track-title {
    font-weight: 500;
    font-size: 0.95rem;
  }
  .track-artist {
    color: var(--accent);
    font-size: 0.8rem;
    margin-top: 0.15rem;
  }
  .now-playing {
    background: var(--card);
    border-radius: 12px;
    padding: 1rem;
  }
  .now-playing .title {
    font-size: 1.05rem;
    font-weight: 500;
    margin-bottom: 0.2rem;
  }
  .now-playing .artist {
    color: var(--accent);
    font-size: 0.85rem;
    margin-bottom: 0.75rem;
  }
  .now-playing.empty .title { color: var(--muted); font-weight: 400; }
  .now-playing.empty .artist { display: none; }
  audio { width: 100%; }
  .resume-prompt {
    margin-top: 0.75rem;
    padding: 0.6rem 0.85rem;
    background: var(--card-2);
    border-radius: 8px;
    font-size: 0.85rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .resume-prompt button {
    background: var(--accent);
    color: #001b22;
    border: none;
    border-radius: 6px;
    padding: 0.3rem 0.6rem;
    font-size: 0.8rem;
    cursor: pointer;
    font-weight: 600;
  }
  .resume-prompt button.secondary {
    background: transparent;
    color: var(--muted);
    font-weight: 400;
  }
  .plyr--audio .plyr__controls {
    background: var(--card-2);
    border-radius: 8px;
  }
  .plyr--full-ui input[type=range] { color: var(--accent); }
  .plyr__control--overlaid { background: var(--accent); }
  footer {
    margin-top: 2rem;
    text-align: center;
    color: var(--muted);
    font-size: 0.75rem;
  }
  footer a { color: var(--muted); }
</style>
</head>
<body>
<div class="app">
  <header>
    <h1>Audio Library</h1>
    <p>Streaming directly from GitHub Releases. No server.</p>
  </header>

  <ul id="tracks" class="tracks" aria-label="Track list"></ul>

  <div id="now-playing" class="now-playing empty">
    <div class="title" id="np-title">No track selected</div>
    <div class="artist" id="np-artist"></div>
    <audio id="player" controls preload="metadata"></audio>
    <div id="resume" class="resume-prompt" hidden></div>
  </div>

  <footer>
    <a href="upload.html">Upload (owner only)</a>
  </footer>
</div>

<script src="https://cdn.jsdelivr.net/npm/plyr@3.7.8/dist/plyr.min.js" crossorigin="anonymous"></script>
<script type="module" src="assets/js/player.js"></script>
</body>
</html>
