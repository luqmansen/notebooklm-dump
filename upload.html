<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Upload — Audio Library</title>
<style>
  :root {
    --bg: #121212;
    --card: #1e1e1e;
    --card-2: #262626;
    --accent: #00b4d8;
    --text: #ffffff;
    --muted: #a0a0a0;
    --border: #2e2e2e;
    --danger: #e63946;
    --ok: #4ade80;
  }
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    margin: 0;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 2rem 1rem;
  }
  .app { width: 100%; max-width: 560px; }
  header { margin-bottom: 1.5rem; display: flex; justify-content: space-between; align-items: center; }
  header h1 { font-size: 1.4rem; margin: 0; font-weight: 600; }
  header a { color: var(--muted); font-size: 0.85rem; text-decoration: none; }
  .card {
    background: var(--card);
    padding: 1.25rem;
    border-radius: 12px;
    margin-bottom: 1rem;
  }
  label {
    display: block;
    font-size: 0.85rem;
    color: var(--muted);
    margin-bottom: 0.35rem;
  }
  input[type=text], input[type=password], input[type=file] {
    width: 100%;
    padding: 0.65rem;
    background: var(--card-2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-size: 0.95rem;
    font-family: inherit;
    margin-bottom: 0.85rem;
  }
  input[type=file] { padding: 0.4rem; }
  input:focus { outline: 2px solid var(--accent); outline-offset: -1px; }
  button {
    background: var(--accent);
    color: #001b22;
    border: none;
    padding: 0.7rem 1.2rem;
    border-radius: 6px;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
  }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  button.ghost {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
    font-weight: 400;
  }
  .row { display: flex; gap: 0.5rem; align-items: center; }
  .row button { flex: 0 0 auto; }
  .status {
    font-family: ui-monospace, monospace;
    font-size: 0.85rem;
    color: var(--muted);
    margin-top: 0.75rem;
    white-space: pre-wrap;
  }
  .status .ok { color: var(--ok); }
  .status .err { color: var(--danger); }
  .progress {
    height: 6px;
    background: var(--card-2);
    border-radius: 3px;
    margin-top: 0.5rem;
    overflow: hidden;
  }
  .progress-bar {
    height: 100%;
    background: var(--accent);
    width: 0%;
    transition: width 0.15s;
  }
  .help {
    font-size: 0.8rem;
    color: var(--muted);
    line-height: 1.5;
  }
  .help code {
    background: var(--card-2);
    padding: 0.1rem 0.3rem;
    border-radius: 3px;
    font-size: 0.85em;
  }
  .hidden { display: none !important; }
</style>
</head>
<body>
<div class="app">
  <header>
    <h1>Upload</h1>
    <a href="index.html">← Back to library</a>
  </header>

  <!-- Locked: no PAT in storage -->
  <section id="auth-card" class="card">
    <label for="pat">Fine-grained personal access token</label>
    <input id="pat" type="password" placeholder="github_pat_..." autocomplete="off">
    <div class="row">
      <button id="auth-btn">Unlock</button>
    </div>
    <p class="help" style="margin-top: 1rem;">
      Token scope: <code>Contents: Read and write</code> on this repo only. Stored locally in your browser. Use the "Log out" button to clear it.
    </p>
    <div id="auth-status" class="status"></div>
  </section>

  <!-- Unlocked: upload form -->
  <section id="upload-card" class="card hidden">
    <label for="file">Audio file (M4A, MP4, MP3)</label>
    <input id="file" type="file" accept="audio/*,.m4a,.mp4,.mp3">

    <label for="title">Title</label>
    <input id="title" type="text" placeholder="e.g. How MapReduce Tamed Massive Data Clusters">

    <label for="artist">Artist / source</label>
    <input id="artist" type="text" placeholder="e.g. NotebookLM">

    <div class="row" style="margin-top: 0.5rem;">
      <button id="upload-btn">Upload &amp; Publish</button>
      <button id="logout-btn" class="ghost">Log out</button>
    </div>

    <div class="progress hidden" id="progress-wrap">
      <div class="progress-bar" id="progress-bar"></div>
    </div>
    <div id="upload-status" class="status"></div>
  </section>
</div>

<script type="module" src="assets/js/uploader.js"></script>
</body>
</html>
