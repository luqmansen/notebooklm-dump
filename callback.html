<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Signing in…</title>
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #121212;
    color: #ffffff;
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
  }
  .msg {
    text-align: center;
    max-width: 480px;
    line-height: 1.5;
  }
  .err { color: #e63946; font-weight: 500; margin-bottom: 0.5rem; }
  a { color: #00b4d8; }
</style>
</head>
<body>
<div class="msg" id="msg">Signing in…</div>
<script type="module">
  import { handleCallback } from './assets/js/auth.js';
  const $msg = document.getElementById('msg');
  try {
    const returnTo = await handleCallback();
    $msg.textContent = 'Signed in. Redirecting…';
    location.replace(returnTo);
  } catch (e) {
    console.error('OAuth callback failed:', e);
    $msg.innerHTML =
      '<div class="err">Sign-in failed</div>' +
      '<div>' + (e.message || 'Unknown error') + '</div>' +
      '<div style="margin-top:1rem;"><a href="index.html">← Back to library</a></div>';
  }
</script>
</body>
</html>
